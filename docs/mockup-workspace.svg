<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="멀티 터미널 작업기 메인 화면 (와이어프레임 목업)">
  <rect width="960" height="600" rx="12" fill="#161918" stroke="#343b38"/>

  <!-- ══ sidebar ══ -->
  <path d="M1 13a12 12 0 0 1 12-12h251v598H13a12 12 0 0 1-12-12z" fill="#1c201f"/>
  <line x1="264" y1="1" x2="264" y2="599" stroke="#343b38"/>

  <!-- brand -->
  <g transform="translate(18,20) scale(0.8)">
    <rect x="1.32" y="1.32" width="21.36" height="21.36" rx="5.4" fill="#252b29"/>
    <g fill="none" stroke="#4fb7a4" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6.6,6.8 12.2,12.1 6.6,17.4"/>
      <line x1="13.4" y1="17.4" x2="18.4" y2="17.4"/>
    </g>
  </g>
  <text x="44" y="36" font-size="13" font-weight="700" fill="#e7ebe8">멀티 터미널 작업기</text>

  <!-- projects heading + actions -->
  <text x="18" y="72" font-size="10" font-weight="600" fill="#717b76" letter-spacing="1">PROJECTS</text>
  <g stroke="#9aa49f" stroke-width="1.3" fill="none" stroke-linecap="round">
    <path d="M215 66a6 6 0 1 0 1.8-4.3M215.8 58v4h4" transform="translate(0,4)"/>
    <path d="M243 68v-10M238 63h10"/>
  </g>

  <!-- project: atlas (expanded, selected) -->
  <rect x="8" y="84" width="248" height="30" rx="6" fill="#252b29"/>
  <rect x="8" y="84" width="3" height="30" rx="1.5" fill="#4fb7a4"/>
  <text x="22" y="97" font-size="10" fill="#717b76">▾</text>
  <text x="36" y="98" font-size="12" fill="#e7ebe8">📂</text>
  <text x="56" y="98" font-size="12.5" font-weight="600" fill="#e7ebe8">atlas</text>
  <text x="56" y="110" font-size="9.5" font-family="Consolas, monospace" fill="#717b76">C:\work\atlas</text>
  <text x="240" y="101" font-size="11" fill="#717b76">✎</text>

  <!-- sessions under atlas -->
  <rect x="8" y="118" width="248" height="26" rx="6" fill="#2a302e"/>
  <text x="52" y="135" font-size="11.5" fill="#e7ebe8">🤖  Claude Code 1</text>
  <circle cx="240" cy="131" r="4" fill="#d8a24a"/>
  <rect x="8" y="146" width="248" height="26" rx="6" fill="none"/>
  <text x="52" y="163" font-size="11.5" fill="#9aa49f">⌨  PowerShell 1</text>
  <circle cx="240" cy="159" r="4" fill="#4fb7a4"/>

  <!-- collapsed projects -->
  <text x="22" y="190" font-size="10" fill="#717b76">▸</text>
  <text x="36" y="191" font-size="12" fill="#9aa49f">📁</text>
  <text x="56" y="191" font-size="12.5" fill="#9aa49f">dashboard</text>
  <text x="240" y="191" font-size="11" fill="#717b76">✎</text>
  <text x="22" y="218" font-size="10" fill="#717b76">▸</text>
  <text x="36" y="219" font-size="12" fill="#9aa49f">📁</text>
  <text x="56" y="219" font-size="12.5" fill="#9aa49f">navi</text>
  <text x="240" y="219" font-size="11" fill="#717b76">✎</text>

  <!-- hidden toggle -->
  <rect x="18" y="516" width="11" height="11" rx="2.5" fill="none" stroke="#46504c"/>
  <text x="38" y="526" font-size="10.5" fill="#9aa49f">Show hidden projects</text>

  <!-- update badge -->
  <line x1="1" y1="542" x2="264" y2="542" stroke="#343b38"/>
  <g fill="none" stroke="#9aa49f" stroke-width="1.2" stroke-linecap="round">
    <path d="M18 561a6 6 0 1 0 1.8-4.3M18.8 553v4h4"/>
  </g>
  <text x="36" y="562" font-size="10" font-family="Consolas, monospace" fill="#9aa49f">v1.0.0</text>
  <text x="82" y="562" font-size="10" fill="#717b76">Up to date</text>
  <rect x="205" y="550" width="46" height="18" rx="4" fill="none" stroke="#46504c"/>
  <text x="228" y="563" font-size="10" fill="#e7ebe8" text-anchor="middle">Check</text>

  <!-- footer -->
  <line x1="1" y1="576" x2="264" y2="576" stroke="#343b38"/>
  <circle cx="21" cy="589" r="3.5" fill="#4fb7a4"/>
  <text x="34" y="592" font-size="9" font-family="Consolas, monospace" fill="#717b76">3 projects  /  2 sessions</text>

  <!-- ══ workspace header ══ -->
  <line x1="264" y1="55" x2="959" y2="55" stroke="#343b38"/>
  <text x="284" y="27" font-size="13.5" font-weight="600" fill="#e7ebe8">atlas</text>
  <text x="322" y="27" font-size="13.5" fill="#717b76">·</text>
  <text x="334" y="27" font-size="13.5" fill="#9aa49f">Claude Code 1</text>
  <text x="284" y="44" font-size="10" font-family="Consolas, monospace" fill="#717b76">C:\work\atlas</text>

  <!-- status pill -->
  <rect x="560" y="18" width="128" height="21" rx="10.5" fill="#2b2416" stroke="#d8a24a"/>
  <circle cx="575" cy="28.5" r="3.5" fill="#d8a24a"/>
  <text x="586" y="32" font-size="10.5" font-weight="600" fill="#d8a24a">awaiting-approval</text>

  <!-- action buttons -->
  <g fill="none" stroke="#9aa49f" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M706 22a7 7 0 1 0 2-4.9M706 15v4.5h4.5"/>
    <path d="M737 22l9 6.5-9 6.5z" transform="translate(0,-11.5)"/>
    <rect x="770" y="22" width="12" height="12" rx="2.5" transform="translate(0,-11.5)"/>
    <path d="M801 13h14M804 13v-2h8v2M803 16h12l-1 14h-10z"/>
  </g>
  <rect x="836" y="16" width="104" height="25" rx="6" fill="#252b29" stroke="#46504c"/>
  <text x="852" y="33" font-size="11.5" fill="#e7ebe8">＋ New session</text>

  <!-- ══ terminal viewport ══ -->
  <rect x="276" y="68" width="672" height="518" rx="8" fill="#101312" stroke="#343b38"/>
  <g font-family="Consolas, Cascadia Code, monospace" font-size="11.5">
    <text x="294" y="94" fill="#717b76">$ claude --resume 3f9a…</text>
    <text x="294" y="118" fill="#9aa49f">읽는 중  src/main/terminal/terminal-coordinator.ts</text>
    <text x="294" y="142" fill="#9aa49f">읽는 중  src/main/projects/project-registry.ts</text>

    <text x="294" y="178" fill="#e7ebe8">● 링버퍼 트리밍이 UTF-8 경계를 무시하고 자르고 있습니다.</text>
    <text x="294" y="198" fill="#e7ebe8">  경계를 보존하도록 고치겠습니다.</text>

    <rect x="294" y="216" width="636" height="86" rx="6" fill="#1c201f" stroke="#d8a24a"/>
    <text x="310" y="238" font-size="11" fill="#d8a24a">Edit  src/main/terminal/terminal-session-manager.ts</text>
    <text x="310" y="260" fill="#d46a6a">- this.buffer = this.buffer.subarray(overflow);</text>
    <text x="310" y="280" fill="#73b987">+ this.buffer = tailOnUtf8Boundary(this.buffer, this.maxBytes);</text>

    <text x="294" y="330" fill="#e7ebe8">이 편집을 적용할까요?</text>
    <text x="294" y="354" fill="#4fb7a4">❯ 1. Yes</text>
    <text x="294" y="374" fill="#9aa49f">  2. Yes, and don't ask again</text>
    <text x="294" y="394" fill="#9aa49f">  3. No, tell Claude what to do differently</text>
    <rect x="294" y="410" width="7" height="14" fill="#4fb7a4" opacity="0.85"/>
  </g>

  <!-- ══ Windows notification toast ══ -->
  <g opacity="0.97">
    <rect x="638" y="470" width="292" height="96" rx="8" fill="#202524" stroke="#46504c"/>
    <rect x="638" y="470" width="4" height="96" rx="2" fill="#d8a24a"/>
    <g transform="translate(658,492) scale(0.72)">
      <rect x="1.32" y="1.32" width="21.36" height="21.36" rx="5.4" fill="#252b29"/>
      <g fill="none" stroke="#4fb7a4" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6.6,6.8 12.2,12.1 6.6,17.4"/>
        <line x1="13.4" y1="17.4" x2="18.4" y2="17.4"/>
      </g>
    </g>
    <text x="694" y="500" font-size="11.5" font-weight="600" fill="#e7ebe8">Claude · atlas</text>
    <text x="694" y="521" font-size="11" fill="#9aa49f">Approval required</text>
    <text x="658" y="551" font-size="9.5" fill="#717b76">창이 가려져 있을 때만 알린다 · 클릭하면 해당 세션으로</text>
  </g>
</svg>

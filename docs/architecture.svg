<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="멀티 터미널 작업기 아키텍처 — main / utilityProcess / renderer 3-프로세스 구조">
  <rect width="960" height="460" rx="12" fill="#161918" stroke="#343b38"/>

  <!-- ── main process ── -->
  <rect x="286" y="28" width="388" height="104" rx="10" fill="#202524" stroke="#4fb7a4"/>
  <text x="480" y="54" font-size="13.5" font-weight="700" fill="#4fb7a4" text-anchor="middle">Electron main</text>
  <text x="480" y="76" font-size="11" fill="#e7ebe8" text-anchor="middle">창 · 트레이 · 알림 · 앱 수명주기</text>
  <text x="480" y="95" font-size="11" fill="#e7ebe8" text-anchor="middle">프로젝트 레지스트리 (락 · 원자적 쓰기 · 검증된 백업)</text>
  <text x="480" y="117" font-size="10.5" fill="#9aa49f" text-anchor="middle">자동 업데이트 — electron-updater</text>

  <!-- ── preload bridge ── -->
  <rect x="150" y="186" width="200" height="34" rx="17" fill="#252b29" stroke="#46504c"/>
  <text x="250" y="208" font-size="11" fill="#9aa49f" text-anchor="middle">typed preload bridge</text>

  <!-- arrows: main ↔ preload ↔ renderer -->
  <g stroke="#46504c" stroke-width="1.4" fill="none">
    <path d="M330 132 L250 186" marker-end="url(#a)"/>
    <path d="M250 220 L250 258" marker-end="url(#a)"/>
    <path d="M630 132 L710 258" marker-end="url(#a)"/>
  </g>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#46504c"/>
    </marker>
  </defs>
  <text x="286" y="172" font-size="9.5" fill="#717b76">IPC (exact-key 검증)</text>
  <text x="672" y="196" font-size="9.5" fill="#717b76">IPC</text>

  <!-- ── renderer ── -->
  <rect x="106" y="258" width="288" height="128" rx="10" fill="#1c201f" stroke="#343b38"/>
  <text x="250" y="284" font-size="13" font-weight="700" fill="#e7ebe8" text-anchor="middle">Renderer (sandboxed)</text>
  <text x="250" y="308" font-size="11" fill="#9aa49f" text-anchor="middle">React · 프로젝트 트리 · xterm.js</text>
  <rect x="130" y="324" width="240" height="44" rx="7" fill="#101312" stroke="#343b38"/>
  <text x="146" y="343" font-size="10" font-family="Consolas, monospace" fill="#4fb7a4">&gt;_</text>
  <text x="170" y="343" font-size="10" font-family="Consolas, monospace" fill="#9aa49f">터미널 뷰포트</text>
  <text x="146" y="360" font-size="9.5" fill="#717b76">파일·프로세스에 직접 닿지 않는다</text>

  <!-- ── utility process ── -->
  <rect x="566" y="258" width="288" height="128" rx="10" fill="#1c201f" stroke="#343b38"/>
  <text x="710" y="284" font-size="13" font-weight="700" fill="#e7ebe8" text-anchor="middle">utilityProcess</text>
  <text x="710" y="308" font-size="11" fill="#9aa49f" text-anchor="middle">node-pty (ConPTY / Unix PTY) × N</text>
  <rect x="590" y="324" width="240" height="44" rx="7" fill="#202524" stroke="#343b38"/>
  <text x="606" y="343" font-size="10" fill="#9aa49f">bounded ring buffer (UTF-8 경계 보존)</text>
  <text x="606" y="360" font-size="9.5" fill="#717b76">크래시 시 지수 백오프 재시작 · 5회 후 정지</text>

  <!-- ── shared registry file ── -->
  <path d="M712 46h96l14 14v58h-110z" fill="#252b29" stroke="#d8a24a"/>
  <path d="M808 46v14h14" fill="none" stroke="#d8a24a"/>
  <text x="767" y="80" font-size="9.5" font-family="Consolas, monospace" fill="#d8a24a" text-anchor="middle">projects.json</text>
  <text x="767" y="98" font-size="9" fill="#9aa49f" text-anchor="middle">~/.harness-manager</text>
  <line x1="674" y1="80" x2="712" y2="80" stroke="#d8a24a" stroke-width="1.4" stroke-dasharray="4 3"/>

  <!-- harness manager -->
  <rect x="712" y="140" width="110" height="30" rx="6" fill="#202524" stroke="#46504c"/>
  <text x="767" y="160" font-size="10" fill="#9aa49f" text-anchor="middle">Harness Manager</text>
  <line x1="767" y1="118" x2="767" y2="140" stroke="#46504c" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="836" y="130" font-size="9" fill="#717b76">공동 소유</text>

  <!-- ── CLI processes ── -->
  <g>
    <rect x="590" y="404" width="70" height="30" rx="6" fill="#202524" stroke="#46504c"/>
    <text x="625" y="424" font-size="10" fill="#e7ebe8" text-anchor="middle">claude</text>
    <rect x="672" y="404" width="70" height="30" rx="6" fill="#202524" stroke="#46504c"/>
    <text x="707" y="424" font-size="10" fill="#e7ebe8" text-anchor="middle">codex</text>
    <rect x="754" y="404" width="100" height="30" rx="6" fill="#202524" stroke="#46504c"/>
    <text x="804" y="424" font-size="10" fill="#e7ebe8" text-anchor="middle">PS / Bash</text>
  </g>
  <line x1="710" y1="386" x2="710" y2="404" stroke="#46504c" stroke-width="1.3"/>

  <!-- status feedback path -->
  <path d="M566 420 L470 420 L470 132" stroke="#d8a24a" stroke-width="1.3" fill="none" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="352" y="424" font-size="9.5" fill="#d8a24a">세션 상태 — Claude 훅 오버레이 · Codex OSC</text>
</svg>

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Require tag and package version to match
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${package_version}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match package.json v${package_version}" >&2
            exit 1
          }

  windows:
    needs: verify-version
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/Multi-CLI-Work-Setup-*.exe
            release/Multi-CLI-Work-Setup-*.exe.blockmap
            release/latest.yml

  linux:
    needs: verify-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm python3
      - run: npm ci
      - name: Rebuild node-pty for the native Electron ABI
        run: npm run rebuild:native
      - run: npm test
      - run: npm run build
      - name: Package Linux assets
        run: npx electron-builder --linux deb AppImage --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: |
            release/Multi-CLI-Work-*-linux-x64.deb
            release/Multi-CLI-Work-*-linux-x64.AppImage
            release/latest-linux.yml

  draft-release:
    if: github.ref_type == 'tag'
    needs: [windows, linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*
